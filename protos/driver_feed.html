<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Old Lucky Dog — Driver Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#101114; --surface:#161A1E; --surface-2:#1B2026;
  --text:#F5F3EE; --muted:#BFC7CC; --faint:#79828A;
  --copper:#C9782F; --copper-bright:#E59A4D; --blue:#63A4D1; --green:#49A579;
  --line:rgba(191,199,204,0.10); --line-2:rgba(191,199,204,0.16);
  --sora:'Sora','Verdana',sans-serif; --inter:'Inter',system-ui,sans-serif; --mono:'IBM Plex Mono','Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--inter);background:radial-gradient(120% 80% at 50% 0%, #0c0e11 0%, #050506 70%);
  color:var(--text);-webkit-font-smoothing:antialiased;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:28px 16px;}
.stage{display:flex;flex-direction:column;align-items:center;gap:18px}
.phone{width:390px;max-width:100%;height:min(860px,94vh);background:var(--bg);border-radius:42px;border:1px solid #23292f;
  box-shadow:0 0 0 9px #16191d,0 0 0 10px #2a3036,0 40px 90px -30px rgba(0,0,0,0.9);position:relative;overflow:hidden;display:flex;flex-direction:column;}
.statusbar{flex:0 0 auto;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-family:var(--mono);font-size:13px;color:var(--text);}
.statusbar .glyphs{display:flex;align-items:center;gap:6px}
.statusbar .bar{width:3px;border-radius:1px;background:var(--text)}
.statusbar .bar.b1{height:5px;opacity:.5}.statusbar .bar.b2{height:7px;opacity:.7}.statusbar .bar.b3{height:9px;opacity:.85}.statusbar .bar.b4{height:11px}
.statusbar .batt{width:22px;height:11px;border:1px solid var(--text);border-radius:3px;position:relative;opacity:.9}
.statusbar .batt::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:var(--text);border-radius:0 1px 1px 0}
.statusbar .batt::before{content:"";position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:13px;background:var(--text);border-radius:1px}
.eyebrow{font-weight:600;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--copper)}

/* app header */
.appbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:6px 20px 10px}
.brand{display:flex;align-items:center;gap:10px}
.brand img{height:28px;width:auto;display:block}
.brand .title{font-weight:600;font-size:16px}
.brand .title small{display:block;font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.reads{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.reads .rn{font-family:var(--mono);font-size:16px;color:var(--text);line-height:1}
.reads .rl{font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}

/* deck area */
.deck{flex:1 1 auto;position:relative;margin:4px 16px 0;perspective:1200px}
.cardslot{position:absolute;inset:0}
.dcard{position:absolute;inset:0;background:linear-gradient(180deg,var(--surface) 0%, #13171b 100%);
  border:1px solid var(--line);border-radius:22px;padding:20px 18px 16px;display:flex;flex-direction:column;
  box-shadow:0 24px 50px -28px rgba(0,0,0,.8);overflow:hidden}
#behind .dcard{transform:scale(.94) translateY(14px);opacity:.55}
#active{z-index:3}
.dcard.swipe{transition:transform .35s cubic-bezier(.22,.61,.36,1),opacity .35s ease}
.dcard .glow{position:absolute;inset:0;border-radius:22px;pointer-events:none;opacity:0;
  box-shadow:inset 0 0 0 1.5px var(--copper),inset 0 0 60px -10px rgba(201,120,47,.35);transition:opacity .1s}

.dc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.dtype{font-weight:600;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--copper)}
.dhoriz{font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase;border:1px solid var(--line-2);border-radius:999px;padding:3px 9px}
.headline{font-family:var(--sora);font-weight:700;font-size:21px;line-height:1.16;letter-spacing:-.01em;margin-bottom:18px}

/* two-node graph */
.graph{background:rgba(13,14,17,.45);border:1px solid var(--line);border-radius:14px;padding:14px 12px 12px;margin-bottom:14px}
.grow{display:flex;align-items:stretch;gap:8px}
.node{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:10px 11px;min-width:0}
.node.driver{border-top:2px solid var(--copper)}
.node.lagging{border-top:2px solid var(--blue)}
.node .nlab{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:5px}
.node .nname{font-weight:600;font-size:13px;line-height:1.15;margin-bottom:6px}
.node .nstate{font-family:var(--mono);font-size:11px;display:flex;align-items:center;gap:5px}
.node.driver .nstate{color:var(--copper)}
.node.lagging .nstate{color:var(--blue)}
.connector{flex:0 0 30px;display:flex;align-items:center;justify-content:center;position:relative}
.connector svg{width:30px;height:16px;overflow:visible}
.mech{display:flex;align-items:center;gap:9px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line-2)}
.mech .ml{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--copper);flex:0 0 auto}
.mech .mt{font-size:11.5px;color:var(--muted);line-height:1.35}

.tension{font-size:12.5px;color:var(--muted);line-height:1.45;margin:2px 2px 0;padding-left:11px;border-left:2px solid rgba(201,120,47,.4)}
/* micro-forecast */
.qzone{margin-top:auto}
.qlab{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.question{font-family:var(--sora);font-weight:600;font-size:17px;line-height:1.25;margin-bottom:10px;letter-spacing:-.005em}
.mktchip{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--blue);
  border:1px solid rgba(99,164,209,.3);border-radius:999px;padding:4px 10px;margin-bottom:16px}
.mktchip .md{width:5px;height:5px;border-radius:50%;background:var(--blue)}

/* swipe stamps */
.stamp{position:absolute;top:74px;font-family:var(--sora);font-weight:800;font-size:30px;letter-spacing:.04em;
  border:3px solid var(--copper);color:var(--copper);border-radius:12px;padding:5px 14px;opacity:0;pointer-events:none}
.stamp.yes{left:22px;transform:rotate(-14deg)}
.stamp.no{right:22px;transform:rotate(14deg)}

/* controls */
.controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:2px}
.cbtn{appearance:none;border:none;cursor:pointer;background:var(--surface-2);border:1px solid var(--line-2);
  border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .1s,border-color .15s,background .15s}
.cbtn:active{transform:scale(.92)}
.cbtn svg{stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;fill:none}
.cbtn.no{width:54px;height:54px}.cbtn.no svg{width:22px;height:22px;stroke:var(--muted)}
.cbtn.no:hover{border-color:var(--muted)}
.cbtn.skip{width:44px;height:44px}.cbtn.skip svg{width:17px;height:17px;stroke:var(--faint)}
.cbtn.yes{width:54px;height:54px;background:var(--copper);border-color:var(--copper)}
.cbtn.yes svg{width:24px;height:24px;stroke:var(--bg)}
.cbtn.yes:hover{filter:brightness(1.05)}
.clabels{display:flex;align-items:center;justify-content:center;gap:0;margin-top:8px}
.clabels span{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
.clabels .l{width:54px;text-align:center}.clabels .m{width:44px;margin:0 16px;text-align:center}.clabels .r{width:54px;text-align:center}

.express{display:flex;justify-content:center;margin-top:12px}
.express button{appearance:none;background:none;border:none;cursor:pointer;font-family:var(--inter);font-weight:500;font-size:12px;color:var(--faint);letter-spacing:.01em}
.express button:hover{color:var(--copper)}

/* footer hint + dots */
.feedfoot{flex:0 0 auto;padding:12px 20px calc(10px + env(safe-area-inset-bottom,6px))}
.dots{display:flex;justify-content:center;gap:6px;margin-bottom:9px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--line-2)}
.dot.on{background:var(--copper);width:18px;border-radius:3px;transition:width .2s}
.swipehint{text-align:center;font-size:10px;color:var(--faint);letter-spacing:.02em}

.toast{position:absolute;left:50%;bottom:96px;transform:translate(-50%,12px);opacity:0;pointer-events:none;background:var(--text);color:var(--bg);font-weight:600;font-size:12px;padding:10px 15px;border-radius:11px;box-shadow:0 12px 30px -8px rgba(0,0,0,.7);transition:opacity .25s,transform .25s;white-space:nowrap;z-index:9}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast .hl{color:var(--copper)}
.caption{font-family:var(--mono);font-size:11px;color:#5b636b;letter-spacing:.04em;text-align:center;max-width:380px;line-height:1.5}
@media (prefers-reduced-motion: reduce){*{animation:none!important}}
@media (max-width:430px){body{padding:0}.phone{border-radius:0;height:100vh;border:none;box-shadow:none}.caption{display:none}}
</style>
</head>

<script>
(function(){
  var ARROW='<svg viewBox="0 0 30 16"><line x1="2" y1="8" x2="24" y2="8" stroke="var(--copper)" stroke-width="1.6"/><polyline points="19,3 25,8 19,13" fill="none" stroke="var(--copper)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  function dirGlyph(d){return d==='up'?'\u25B2':d==='down'?'\u25BC':'\u2192';}

  var CARDS=[
    {type:'Macro \u2192 Equity',horizon:'This week',
     headline:'Cut odds are climbing. The banks haven\u2019t noticed.',
     a:{name:'Fed cut odds',state:'38% rising',dir:'up'},
     b:{name:'Regional banks',state:'flat \u00b7 lagging',dir:'flat'},
     mech:'Cuts steepen the curve \u2192 margin relief',
     tension:'Cut odds have climbed about 9 points this week. Regional-bank pricing hasn’t moved.',q:'Do regional banks outperform the S&P this week?',mkt:46},
    {type:'Event \u2192 Crypto',horizon:'Next week',
     headline:'Access expands Thursday. Vol is drifting down.',
     a:{name:'Perps access milestone',state:'lands Thu',dir:'up'},
     b:{name:'BTC implied vol',state:'32% falling',dir:'down'},
     mech:'Broader access \u2192 higher realized vol',
     tension:'The access milestone lands Thursday — yet implied vol keeps bleeding lower.',q:'Does BTC realized vol rise next week?',mkt:48},
    {type:'Theme \u2192 Cross-asset',horizon:'This quarter',
     headline:'Datacenter capex just jumped. Power names didn\u2019t.',
     a:{name:'Hyperscaler capex',state:'guide raised',dir:'up'},
     b:{name:'Power producers',state:'flat \u00b7 lagging',dir:'flat'},
     mech:'Datacenter load \u2192 electricity demand',
     tension:'The capex guide jumped this week. Power-producer demand outlooks are unchanged.',q:'Does an IPP raise demand guidance this quarter?',mkt:50},
    {type:'Commodity \u2192 Equity',horizon:'Into earnings',
     headline:'Crude is pricing a tail. Airline vol is asleep.',
     a:{name:'Crude oil',state:'bid \u00b7 tail risk',dir:'up'},
     b:{name:'Airline options vol',state:'calm \u00b7 lagging',dir:'flat'},
     mech:'Jet fuel is a top airline cost',
     tension:'Crude is bid on supply risk while airline option vol sits near its lows.',q:'Does an airline cut margin guidance before earnings?',mkt:42},
    {type:'Crypto \u2192 Equity',horizon:'This week',
     headline:'Inflows are spiking. Miners are lagging the move.',
     a:{name:'Spot-BTC inflows',state:'record week',dir:'up'},
     b:{name:'Bitcoin miners',state:'flat \u00b7 lagging',dir:'flat'},
     mech:'Inflows lift BTC \u2192 miner revenue (levered)',
     tension:'Inflows hit a record this week; miners still trail the BTC move.',q:'Do miners close the gap to BTC this week?',mkt:45},
    {type:'Macro \u2192 Options',horizon:'CPI day',
     headline:'CPI is pricing benign. Weeklies are still rich.',
     a:{name:'CPI in-line odds',state:'60% benign',dir:'up'},
     b:{name:'SPX weekly vol',state:'elevated \u00b7 lagging',dir:'flat'},
     mech:'An in-line print crushes event vol',
     tension:'Consensus says in-line, but weekly options are still pricing a real move.',q:'Does CPI print in-line and crush weekly vol?',mkt:55}
  ];

  var idx=0, reads=0;
  var activeSlot=document.getElementById('active'), behindSlot=document.getElementById('behind');
  var toast=document.getElementById('toast');

  function cardHTML(c){
    return '<div class="dcard"><div class="glow"></div>'+
      '<div class="stamp yes">YES</div><div class="stamp no">NO</div>'+
      '<div class="dc-top"><span class="dtype">'+c.type+'</span><span class="dhoriz">'+c.horizon+'</span></div>'+
      '<div class="headline">'+c.headline+'</div>'+
      '<div class="graph"><div class="grow">'+
        '<div class="node driver"><div class="nlab">Driver</div><div class="nname">'+c.a.name+'</div><div class="nstate"><span>'+dirGlyph(c.a.dir)+'</span>'+c.a.state+'</div></div>'+
        '<div class="connector">'+ARROW+'</div>'+
        '<div class="node lagging"><div class="nlab">Lagging</div><div class="nname">'+c.b.name+'</div><div class="nstate"><span>'+dirGlyph(c.b.dir)+'</span>'+c.b.state+'</div></div>'+
      '</div><div class="mech"><span class="ml">Why</span><span class="mt">'+c.mech+'</span></div></div>'+
      '<div class="tension">'+c.tension+'</div>'+
      '<div class="qzone">'+
        '<div class="qlab">Your call</div>'+
        '<div class="question">'+c.q+'</div>'+
        '<div class="mktchip"><span class="md"></span>Market reads this '+c.mkt+'%</div>'+
        '<div class="controls">'+
          '<button class="cbtn no" data-act="no"><svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>'+
          '<button class="cbtn skip" data-act="skip"><svg viewBox="0 0 24 24"><polyline points="6,14 12,8 18,14"/></svg></button>'+
          '<button class="cbtn yes" data-act="yes"><svg viewBox="0 0 24 24"><polyline points="5,12 10,17 19,7"/></svg></button>'+
        '</div>'+
        '<div class="clabels"><span class="l">No</span><span class="m">Skip</span><span class="r">Yes</span></div>'+
        '<div class="express"><button data-act="express">Express this in a Belief Ticket &rarr;</button></div>'+
      '</div></div>';
  }

  function renderDots(){
    var d=document.getElementById('dots'); d.innerHTML='';
    for(var i=0;i<CARDS.length;i++){var s=document.createElement('span');s.className='dot'+(i===idx%CARDS.length?' on':'');d.appendChild(s);}
  }

  function render(){
    activeSlot.innerHTML=cardHTML(CARDS[idx%CARDS.length]);
    behindSlot.innerHTML=cardHTML(CARDS[(idx+1)%CARDS.length]);
    renderDots();
    wire();
  }

  function showToast(html,ms){toast.innerHTML=html;toast.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(function(){toast.classList.remove('show');},ms||1700);}

  function commit(act){
    var card=activeSlot.querySelector('.dcard');
    var c=CARDS[idx%CARDS.length];
    if(act==='express'){showToast('Opening a <span class="hl">Belief Ticket</span> for this \u2192');return;}
    card.classList.add('swipe');
    if(act==='yes'){card.style.transform='translateX(460px) rotate(16deg)';card.style.opacity='0';}
    else if(act==='no'){card.style.transform='translateX(-460px) rotate(-16deg)';card.style.opacity='0';}
    else {card.style.transform='translateY(-460px)';card.style.opacity='0';}
    if(act!=='skip'){reads++;document.getElementById('readn').textContent=reads;
      var lean=act==='yes'?'YES':'NO';
      showToast('Logged \u2014 you lean <span class="hl">'+lean+'</span> \u00b7 market '+c.mkt+'%');}
    card.addEventListener('transitionend',function(){idx++;render();},{once:true});
  }

  // ----- drag -----
  function wire(){
    var card=activeSlot.querySelector('.dcard');
    var glow=card.querySelector('.glow');
    var sy=card.querySelector('.stamp.yes'), sn=card.querySelector('.stamp.no');
    var T=110, dragging=false, x0=0, dx=0, started=false;

    card.addEventListener('pointerdown',function(e){
      if(e.target.closest('.cbtn')||e.target.closest('.express'))return;
      dragging=true;started=false;x0=e.clientX;card.setPointerCapture(e.pointerId);
    });
    card.addEventListener('pointermove',function(e){
      if(!dragging)return;dx=e.clientX-x0;
      if(!started&&Math.abs(dx)<4)return;started=true;
      card.style.transform='translateX('+dx+'px) rotate('+(dx*0.05)+'deg)';
      var p=Math.min(Math.abs(dx)/T,1);
      glow.style.opacity=p*0.9;
      sy.style.opacity=dx>0?p:0; sn.style.opacity=dx<0?p:0;
    });
    function end(){
      if(!dragging)return;dragging=false;
      if(dx>T){commit('yes');}
      else if(dx<-T){commit('no');}
      else {card.classList.add('swipe');card.style.transform='';glow.style.opacity=0;sy.style.opacity=0;sn.style.opacity=0;
        setTimeout(function(){card.classList.remove('swipe');},350);}
      dx=0;
    }
    card.addEventListener('pointerup',end);
    card.addEventListener('pointercancel',end);

    card.querySelectorAll('[data-act]').forEach(function(b){
      b.addEventListener('click',function(e){e.stopPropagation();commit(b.dataset.act);});
    });
  }

  render();
})();
</script>
